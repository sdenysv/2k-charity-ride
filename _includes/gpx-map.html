{% assign map_id = include.id | default: include.gpx | replace: '/', '-' | replace: '.', '-' | replace: '_', '-' %}
{% assign map_height = include.height | default: '420px' %}

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<div style="margin: 1.5rem 0;">
  {% if include.title %}
    <h3 style="margin-bottom: 0.75rem;">{{ include.title }}</h3>
  {% endif %}
  <div id="gpx-map-{{ map_id }}" style="height: {{ map_height }}; width: 100%; border: 1px solid #d9d9d9; border-radius: 10px;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>
<script>
  (function () {
    var mapElementId = "gpx-map-{{ map_id }}";
    var mapElement = document.getElementById(mapElementId);
    var gpxUrl = "{{ include.gpx | relative_url }}";

    if (!mapElement || typeof L === "undefined" || typeof L.GPX === "undefined") {
      return;
    }

    var map = L.map(mapElementId);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    function dotIcon(color) {
      return L.divIcon({
        html: '<div style="width:12px;height:12px;border-radius:50%;background:' + color + ';border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.5)"></div>',
        iconSize: [12, 12],
        iconAnchor: [6, 6],
        className: ""
      });
    }

    new L.GPX(gpxUrl, {
      async: true,
      marker_options: {
        startIconUrl: null,
        endIconUrl: null,
        shadowUrl: null,
        wptIcons: {}
      }
    })
      .on("loaded", function (event) {
        var gpx = event.target;
        map.fitBounds(gpx.getBounds());

        var pts = [];
        gpx.eachLayer(function (group) {
          (group.getLayers ? group.getLayers() : [group]).forEach(function (layer) {
            if (!(layer instanceof L.Polyline)) return;
            var lls = layer.getLatLngs();
            if (lls[0] && Array.isArray(lls[0])) lls = lls.reduce(function (a, b) { return a.concat(b); }, []);
            pts = pts.concat(lls);
          });
        });

        if (pts.length) {
          L.marker(pts[0], { icon: dotIcon("#22c55e") }).addTo(map).bindTooltip("Start");
          L.marker(pts[pts.length - 1], { icon: dotIcon("#ef4444") }).addTo(map).bindTooltip("Finish");
        }
      })
      .on("error", function () {
        mapElement.insertAdjacentHTML("beforebegin", "<p>Could not load GPX track.</p>");
      })
      .addTo(map);
  })();
</script>
